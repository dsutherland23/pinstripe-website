name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Project Archive
        run: |
          # Zip the repository excluding node_modules, git history, and build outputs
          zip -r project.zip . -x "node_modules/*" -x ".git/*" -x ".next/*" -x "out/*" -x "*.zip" -x ".env*"

      - name: Upload Archive via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 -c "
          import ftplib
          import os
          import sys
          import traceback
          
          try:
              host = os.environ.get('FTP_HOST', '')
              user = os.environ.get('FTP_USER', '')
              password = os.environ.get('FTP_PASS', '')
              
              print('Debug info:')
              print('  FTP_HOST length:', len(host))
              print('  FTP_USER length:', len(user))
              print('  FTP_PASS length:', len(password))
              
              if not host or not user or not password:
                  print('Error: One or more FTP credentials are empty in GitHub Secrets. Please add them to your repository Settings > Secrets and variables > Actions.')
                  sys.exit(1)
                  
              print('Connecting to ' + host + '...')
              ftp = ftplib.FTP()
              ftp.set_debuglevel(2)
              ftp.connect(host, 21, timeout=30)
              
              print('Logging in as ' + user + '...')
              ftp.login(user, password)
              ftp.encoding = 'utf-8'
              
              ftp.set_pasv(True)
              
              local_file = 'project.zip'
              remote_file = 'pinstripe-website-main.zip'
              
              print('Uploading ' + local_file + ' as ' + remote_file + '...')
              with open(local_file, 'rb') as f:
                  ftp.storbinary('STOR ' + remote_file, f)
              print('Upload successful!')
              ftp.quit()
          except Exception as e:
              print('FTP Upload failed with exception:')
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Trigger Hostinger NodeJS Build
        run: |
          response=$(curl -s -X POST "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds/from-archive" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)" \
            -d '{
              "archive": "pinstripe-website-main.zip",
              "node_version": 22,
              "app_type": "next",
              "root_directory": null,
              "output_directory": ".next",
              "build_script": "build",
              "entry_file": null,
              "package_manager": "npm"
            }')
          
          echo "API Response: $response"
          
          # Check if the response contains uuid
          uuid=$(echo "$response" | grep -o '"uuid":"[^"]*' | grep -o '[^"]*$')
          if [ -z "$uuid" ]; then
            echo "Error: Failed to trigger build (No UUID returned)"
            exit 1
          fi
          
          echo "Build triggered successfully with UUID: $uuid"
          
          # Poll build status
          echo "Polling build status..."
          for i in {1..30}; do
            status_resp=$(curl -s "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds" \
              -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)")
            
            # Extract state for the specific build UUID
            state=$(echo "$status_resp" | grep -o "\"uuid\":\"$uuid\"[^{]*\"state\":\"[^\"]*\"" | grep -o '"state":"[^"]*' | grep -o '[^"]*$')
            echo "Build state: $state"
            
            if [ "$state" = "completed" ]; then
              echo "Build completed successfully!"
              exit 0
            elif [ "$state" = "failed" ]; then
              echo "Build failed! Fetching logs..."
              logs=$(curl -s "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds/$uuid/logs" \
                -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
                -H "Accept: application/json" \
                -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)")
              echo "Logs: $logs"
              exit 1
            fi
            sleep 15
          done
          
          echo "Timeout: Build is still in progress."
          exit 1
