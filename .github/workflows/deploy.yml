name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Project Archive
        run: |
          # Zip the repository excluding node_modules, git history, and build outputs
          zip -r project.zip . -x "node_modules/*" -x ".git/*" -x ".next/*" -x "out/*" -x "*.zip" -x ".env*"

      - name: Trigger Hostinger NodeJS Build
        run: |
          response=$(curl -s -X POST "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds/from-archive" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)" \
            -F "archive=@project.zip" \
            -F "node_version=22" \
            -F "app_type=next" \
            -F "output_directory=.next" \
            -F "build_script=build" \
            -F "package_manager=npm")
          
          echo "API Response: $response"
          
          # Check if the response contains uuid
          uuid=$(echo "$response" | grep -o '"uuid":"[^"]*' | grep -o '[^"]*$')
          if [ -z "$uuid" ]; then
            echo "Error: Failed to trigger build (No UUID returned)"
            exit 1
          fi
          
          echo "Build triggered successfully with UUID: $uuid"
          
          # Poll build status
          echo "Polling build status..."
          for i in {1..30}; do
            status_resp=$(curl -s "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds" \
              -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)")
            
            # Extract state for the specific build UUID
            state=$(echo "$status_resp" | grep -o "\"uuid\":\"$uuid\"[^{]*\"state\":\"[^\"]*\"" | grep -o '"state":"[^"]*' | grep -o '[^"]*$')
            echo "Build state: $state"
            
            if [ "$state" = "completed" ]; then
              echo "Build completed successfully!"
              exit 0
            elif [ "$state" = "failed" ]; then
              echo "Build failed! Fetching logs..."
              logs=$(curl -s "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.FTP_USER }}/websites/pinstripesrentals.com/nodejs/builds/$uuid/logs" \
                -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
                -H "Accept: application/json" \
                -H "User-Agent: Mozilla/5.0 (GitHubActions; Linux x86_64)")
              echo "Logs: $logs"
              exit 1
            fi
            sleep 15
          done
          
          echo "Timeout: Build is still in progress."
          exit 1
