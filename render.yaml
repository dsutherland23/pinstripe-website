# Render Blueprint Specification for Pinstripes Party & Event Rentals
# Docs: https://render.com/docs/blueprints

services:
  - type: web
    name: pinstripe-website
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.x
      - key: HOSTNAME
        value: 0.0.0.0
